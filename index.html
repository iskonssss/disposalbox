<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sutrex Bookings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --std:   #2563eb;
      --std-bg: #dbeafe;
      --rei:   #b45309;
      --rei-bg: #fef3c7;
      --bg: #f1f5f9;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #94a3b8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      touch-action: manipulation; /* prevent double-tap zoom */
    }

    header {
      background: #1e293b;
      color: white;
      padding: 14px 18px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 17px; font-weight: 700; }
    header p  { font-size: 11px; color: #94a3b8; margin-top: 1px; }

    .refresh-btn {
      background: rgba(255,255,255,0.12);
      border: none;
      border-radius: 8px;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 16px;
      color: white;
      flex-shrink: 0;
    }
    .refresh-btn:active { background: rgba(255,255,255,0.22); }

    /* Sync indicator */
    .sync-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
    }
    .sync-dot.syncing { background: #fbbf24; animation: pulse 1s infinite; }
    .sync-dot.error   { background: #f87171; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .type-tabs {
      display: flex;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      gap: 8px;
    }

    .type-tab {
      flex: 1;
      padding: 10px 8px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: white;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: var(--muted);
      text-align: center;
      transition: all 0.15s;
    }

    .type-tab.active-std { border-color: var(--std); background: var(--std-bg); color: var(--std); }
    .type-tab.active-rei { border-color: var(--rei); background: var(--rei-bg); color: var(--rei); }

    .tab-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    /* Loading overlay */
    .loading-bar {
      height: 3px;
      background: var(--std);
      width: 0%;
      transition: width 0.4s ease;
      position: fixed;
      top: 0; left: 0;
      z-index: 999;
    }
    .loading-bar.active { width: 70%; }
    .loading-bar.done   { width: 100%; opacity: 0; transition: width 0.2s, opacity 0.3s 0.2s; }

    /* Calendar */
    .cal-wrap {
      background: var(--card);
      margin: 8px 6px 0;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 10px;
    }

    .cal-nav button {
      background: var(--bg);
      border: none;
      border-radius: 8px;
      width: 34px; height: 34px;
      font-size: 18px;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cal-month { font-size: 16px; font-weight: 700; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .cal-dow {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      padding: 4px 0 8px;
    }

    .cal-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 8px;
      margin: 1px;
      position: relative;
      user-select: none;
      transition: background 0.1s;
      min-width: 0;
    }

    .cal-day:active { background: var(--bg); }
    .cal-day.empty  { cursor: default; }
    .cal-day.past   { opacity: 0.4; }

    .cal-day.today .day-num {
      background: white;
      border: 2px solid #1e293b;
      border-radius: 50%;
      width: 26px; height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1e293b;
      font-weight: 700;
    }

    .day-num {
      font-size: 14px;
      font-weight: 500;
      line-height: 1;
      width: 26px; height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .day-dots {
      display: flex;
      gap: 2px;
      margin-top: 3px;
      height: 7px;
      align-items: center;
    }

    .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot-std-confirmed  { background: var(--std); }
    .dot-std-softbooked { background: var(--std); opacity: 0.5; }
    .dot-std-pending    { background: transparent; border: 1.5px solid var(--std); width: 5px; height: 5px; }
    .dot-rei-confirmed  { background: var(--rei); }
    .dot-rei-softbooked { background: var(--rei); opacity: 0.5; }
    .dot-rei-pending    { background: transparent; border: 1.5px solid var(--rei); width: 5px; height: 5px; }

    /* Upcoming list */
    .upcoming-wrap { margin: 10px 10px 20px; }

    .upcoming-header {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 10px 4px 6px;
    }

    .up-list {
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .up-row {
      display: flex;
      align-items: center;
      padding: 9px 14px;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .up-row:last-child { border-bottom: none; }

    .up-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .up-date { font-size: 12px; font-weight: 700; min-width: 56px; color: var(--text); }
    .up-batch { font-size: 12px; color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .up-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 50px; }

    .badge-confirmed  { background: #dcfce7; color: #16a34a; }
    .badge-softbooked { background: #fef3c7; color: #d97706; }
    .badge-pending    { background: #f1f5f9; color: #64748b; }

    .up-empty { padding: 16px 14px; font-size: 12px; color: var(--muted); text-align: center; }

    /* Sheet */
    .sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 400;
      align-items: flex-end;
    }
    .sheet-overlay.open { display: flex; }

    .sheet {
      background: white;
      border-radius: 20px 20px 0 0;
      padding: 0 0 40px;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      animation: up 0.22s ease;
    }

    @keyframes up { from{transform:translateY(100%)} to{transform:translateY(0)} }

    .sheet-handle {
      width: 36px; height: 4px;
      background: #e2e8f0;
      border-radius: 2px;
      margin: 12px auto 0;
    }

    .sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border);
    }

    .sheet-title { font-size: 16px; font-weight: 700; }

    .sheet-close {
      background: var(--bg);
      border: none;
      border-radius: 50%;
      width: 30px; height: 30px;
      font-size: 16px;
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    .sheet-body { padding: 18px 18px 0; }

    .field-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .field { margin-bottom: 16px; }

    /* Batch number input with prefix */
    .batch-field {
      display: flex;
      align-items: center;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: white;
      transition: border-color 0.15s;
    }
    .batch-field:focus-within { border-color: var(--std); }
    .batch-prefix {
      padding: 12px 6px 12px 14px;
      font-size: 16px;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
      user-select: none;
    }
    .batch-field input[type="number"] {
      border: none;
      flex: 1;
      padding: 12px 14px 12px 2px;
      font-size: 20px;
      font-weight: 700;
      font-family: inherit;
      color: var(--text);
      background: white;
      -webkit-appearance: none;
      outline: none;
      min-width: 0;
    }
    .batch-field input[type="number"]::-webkit-inner-spin-button,
    .batch-field input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    .status-row { display: flex; gap: 8px; }

    .s-chip {
      flex: 1;
      padding: 13px 4px;
      border: 2px solid var(--border);
      border-radius: 9px;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      color: var(--muted);
      background: white;
    }

    .s-chip.sel-confirmed { border-color: #16a34a; background: #dcfce7; color: #16a34a; }
    .s-chip.sel-pending   { border-color: #94a3b8; background: #f1f5f9; color: #64748b; }

    /* Time slot chips — separate class so selStatus doesn't reset them */
    .t-chip {
      flex: 1;
      padding: 13px 4px;
      border: 2px solid var(--border);
      border-radius: 9px;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      color: var(--muted);
      background: white;
    }
    .t-chip.sel { border-color: #334155; background: #f1f5f9; color: #1e293b; }

    /* Multiple dates button below calendar */
    .multi-mode-wrap {
      padding: 6px 6px 0;
    }
    .multi-mode-btn-outer {
      width: 100%;
      background: white;
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 11px;
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      text-align: center;
    }

    /* Invoice toggle chip */
    .i-chip {
      flex: 1;
      padding: 13px 4px;
      border: 2px solid var(--border);
      border-radius: 9px;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      color: var(--muted);
      background: white;
    }
    .i-chip.sel-inv { border-color: #16a34a; background: #dcfce7; color: #16a34a; }

    .save-btn {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      color: white;
      cursor: pointer;
    }

    .save-btn:disabled { opacity: 0.55; }
    .save-btn.std { background: var(--std); }
    .save-btn.rei { background: var(--rei); }

    .delete-btn {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      border: 1.5px solid #fee2e2;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #ef4444;
      background: white;
      cursor: pointer;
    }

    .day-detail { padding: 0 18px; }

    .detail-booking {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .detail-booking:last-child { border-bottom: none; }

    .detail-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .detail-info { flex: 1; }
    .detail-batch { font-size: 14px; font-weight: 700; }
    .detail-meta  { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .add-for { display: flex; gap: 8px; padding: 14px 0 0; }

    .add-for-btn {
      flex: 1;
      padding: 10px 6px;
      border-radius: 10px;
      border: 2px dashed var(--border);
      background: white;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      color: var(--muted);
      text-align: center;
    }

    .add-for-btn.std-add { border-color: var(--std); color: var(--std); }
    .add-for-btn.rei-add { border-color: var(--rei); color: var(--rei); }

    /* Edit hint badge on detail rows */
    .edit-hint {
      font-size: 11px;
      font-weight: 700;
      color: var(--std);
      background: var(--std-bg);
      padding: 3px 9px;
      border-radius: 50px;
      white-space: nowrap;
    }

    /* Select-mode button in cal-nav */
    .sel-mode-btn {
      background: var(--bg);
      border: none;
      border-radius: 8px;
      padding: 5px 11px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
    }

    /* Bar that appears inside the calendar when in select mode */
    .cal-sel-bar {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-top: 1px solid var(--border);
      background: #f8fafc;
    }
    .cal-sel-bar.show { display: flex; }

    .sel-bar-cancel {
      background: none;
      border: none;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 0;
    }
    .sel-bar-label {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      text-align: center;
    }
    .sel-bar-book {
      background: #334155;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .sel-bar-book:disabled { opacity: 0.35; }

    /* Drag-select highlight */
    .cal-day.sel .day-num {
      background: #334155;
      color: white;
      border-radius: 50%;
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Multi-date form */
    .multi-dates {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
      padding: 4px 0 0;
      word-break: break-word;
    }

    .batch-preview {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
      min-height: 18px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 10px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<header>
  <div>
    <h1>Sutrex Bookings</h1>
    <p>Medical Disposal Boxes</p>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <button class="refresh-btn" onclick="manualRefresh()" title="Refresh">↻</button>
    <div class="sync-dot syncing" id="syncDot" title="Syncing..."></div>
  </div>
</header>

<div class="type-tabs">
  <div class="type-tab active-std" id="tab-std" onclick="setType('standard')">
    <span class="tab-dot" style="background:var(--std)"></span>Standard
  </div>
  <div class="type-tab" id="tab-rei" onclick="setType('reinforced')">
    <span class="tab-dot" style="background:var(--rei)"></span>Reinforced
  </div>
</div>

<div class="cal-wrap" style="position:relative">
  <div class="cal-nav">
    <button onclick="prevMonth()">&#8249;</button>
    <span class="cal-month" id="calMonth"></span>
    <button onclick="nextMonth()">&#8250;</button>
  </div>
  <div class="cal-sel-bar" id="calSelBar">
    <button class="sel-bar-cancel" onclick="exitSelMode()">Exit</button>
    <span class="sel-bar-label" id="selBarLabel">Tap dates to select</span>
    <button class="sel-bar-book" id="selBarBook" onclick="bookSelected()" disabled>Book</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<div class="multi-mode-wrap" id="multiModeWrap">
  <button class="multi-mode-btn-outer" onclick="enterSelMode()">Multiple Dates</button>
</div>

<div class="upcoming-wrap">
  <div class="upcoming-header">Upcoming</div>
  <div class="up-list" id="upList"><div class="up-empty">Loading...</div></div>
</div>

<div class="upcoming-wrap">
  <div class="upcoming-header">Past</div>
  <div class="up-list" id="pastList"><div class="up-empty">Loading...</div></div>
</div>

<div class="sheet-overlay" id="sheetOverlay" onclick="handleOverlay(event)">
  <div class="sheet" id="sheetEl">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <span class="sheet-title" id="sheetTitle"></span>
      <button class="sheet-close" onclick="closeSheet()">&#x2715;</button>
    </div>
    <div id="sheetContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Config ───────────────────────────────────────────────────────────────────
  const API = 'https://script.google.com/macros/s/AKfycbw6q7oo2tx_Jfy0sk8b-fWr2Ip4dcnHzdTJOdQF9EfmhDZq50WrVGChOH4OFk5wZCaS/exec';

  // ── State ────────────────────────────────────────────────────────────────────
  let cache       = [];
  let currentType = 'standard';
  let viewYear, viewMonth;
  let editingId   = null;
  let selDates     = [];   // ISO strings selected in multiSelMode
  let multiSelMode = false;

  const today = new Date();
  today.setHours(0,0,0,0);

  // ── Local cache (instant load) ────────────────────────────────────────────────
  function loadLocal() {
    try { return JSON.parse(localStorage.getItem('sx-cache') || '[]'); }
    catch { return []; }
  }
  function saveLocal(d) {
    try { localStorage.setItem('sx-cache', JSON.stringify(d)); } catch {}
  }

  // ── API ───────────────────────────────────────────────────────────────────────
  function setSyncState(state) {
    const dot = document.getElementById('syncDot');
    dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
    dot.title = state === 'syncing' ? 'Syncing…' : state === 'error' ? 'Sync error' : 'Synced';
  }

  function setLoading(on) {
    const bar = document.getElementById('loadingBar');
    if (on) { bar.className = 'loading-bar active'; }
    else     { bar.className = 'loading-bar done'; setTimeout(() => bar.className = 'loading-bar', 500); }
  }

  async function fetchAll() {
    setSyncState('syncing');
    setLoading(true);
    try {
      const res  = await fetch(`${API}?action=get`);
      const data = await res.json();
      cache = Array.isArray(data) ? data.map(b => ({
        ...b,
        date: String(b.date || '').slice(0, 10), // normalize Google Sheets Date timestamps to YYYY-MM-DD
      })) : [];
      saveLocal(cache);
      setSyncState('ok');
    } catch (err) {
      setSyncState('error');
      showToast('Could not sync — showing cached data');
    }
    setLoading(false);
  }

  function bgSync(qs) {
    setSyncState('syncing');
    fetch(`${API}?${qs}`)
      .then(r => r.text())
      .then(text => {
        try {
          const data = JSON.parse(text);
          if (data && data.ok) {
            setSyncState('ok');
          } else {
            setSyncState('error');
            showToast('Sheet error: ' + (data.error || JSON.stringify(data)));
            console.error('bgSync bad response:', data);
          }
        } catch {
          setSyncState('error');
          showToast('Sheet returned unexpected response — check console');
          console.error('bgSync non-JSON:', text.slice(0, 300));
        }
      })
      .catch(err => {
        setSyncState('error');
        showToast('Sync failed: ' + err.message);
        console.error('bgSync fetch error:', err);
      });
  }

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

  function todayISO() {
    const d = today;
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function isoDate(y,m,d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function fmtShort(iso) {
    return new Date(iso+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  }

  function fmtTime(t) {
    if (!t) return '';
    const [h,m] = t.split(':').map(Number);
    return `${h>12?h-12:h}${m?':'+String(m).padStart(2,'0'):''}${h>=12?'pm':'am'}`;
  }

  const STATUS_LABEL = { confirmed:'CONFIRMED', softbooked:'SOFT BOOKED', pending:'PENDING' }; // softbooked kept for legacy data
  const TYPE_COLOR   = { standard:'var(--std)', reinforced:'var(--rei)' };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Box type selector ─────────────────────────────────────────────────────────
  function setType(t) {
    currentType = t;
    document.getElementById('tab-std').className = 'type-tab' + (t==='standard' ? ' active-std' : '');
    document.getElementById('tab-rei').className = 'type-tab' + (t==='reinforced' ? ' active-rei' : '');
  }

  // ── Calendar ──────────────────────────────────────────────────────────────────
  function initCal() {
    viewYear  = today.getFullYear();
    viewMonth = today.getMonth();
    renderCal();
  }

  function prevMonth() { viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} renderCal(); }
  function nextMonth() { viewMonth++; if(viewMonth>11){viewMonth=0; viewYear++;} renderCal(); }

  function renderCal() {
    const monthName = new Date(viewYear, viewMonth, 1)
      .toLocaleDateString('en-GB',{month:'long',year:'numeric'});
    document.getElementById('calMonth').textContent = monthName;

    const firstDay    = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
    const todayIso    = todayISO();

    const byDate = {};
    cache.forEach(b => { (byDate[b.date] = byDate[b.date]||[]).push(b); });

    // DOW headers rendered here to avoid display:contents iOS issues
    let html = ['Su','Mo','Tu','We','Th','Fr','Sa']
      .map(d => `<div class="cal-dow">${d}</div>`).join('');

    for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';

    for (let d = 1; d <= daysInMonth; d++) {
      const iso     = isoDate(viewYear, viewMonth, d);
      const bks     = byDate[iso] || [];
      const isToday = iso === todayIso;
      const isPast  = iso < todayIso;

      const stdBk = bks.find(b => b.boxType === 'standard');
      const reiBk = bks.find(b => b.boxType === 'reinforced');

      const dots = [
        stdBk ? `<div class="dot dot-std-${stdBk.status}"></div>` : '',
        reiBk ? `<div class="dot dot-rei-${reiBk.status}"></div>` : '',
      ].join('');

      const isSel = selDates.includes(iso);
      html += `<div class="cal-day${isToday?' today':''}${isPast?' past':''}${isSel?' sel':''}" data-date="${iso}"><div class="day-num">${d}</div><div class="day-dots">${dots}</div></div>`;
    }

    document.getElementById('calGrid').innerHTML = html;
  }

  // ── Calendar tap + swipe events ──────────────────────────────────────────────
  function attachCalEvents() {
    const grid = document.getElementById('calGrid');
    let touchStartDate = null;
    let startX = 0, startY = 0, currX = 0, currY = 0;

    grid.addEventListener('touchstart', e => {
      startX = currX = e.touches[0].clientX;
      startY = currY = e.touches[0].clientY;
      const day = e.target.closest('[data-date]');
      if (!day) return;
      e.preventDefault();
      touchStartDate = day.dataset.date;
    }, { passive: false });

    grid.addEventListener('touchmove', e => {
      currX = e.touches[0].clientX;
      currY = e.touches[0].clientY;
      if (touchStartDate) e.preventDefault();
    }, { passive: false });

    grid.addEventListener('touchend', e => {
      const dx = currX - startX;
      const dy = currY - startY;

      // Horizontal swipe: > 60px and more horizontal than vertical
      if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
        touchStartDate = null;
        dx < 0 ? nextMonth() : prevMonth();
        return;
      }

      if (!touchStartDate) return;
      e.preventDefault();
      const date = touchStartDate;
      touchStartDate = null;
      handleDayTap(date);
    });

    grid.addEventListener('touchcancel', () => { touchStartDate = null; });

    // Mouse (desktop / testing)
    grid.addEventListener('click', e => {
      const day = e.target.closest('[data-date]');
      if (!day) return;
      handleDayTap(day.dataset.date);
    });
  }

  function handleDayTap(date) {
    if (multiSelMode) {
      toggleSelDate(date);
      updateSelBar();
    } else {
      const bks = cache.filter(b => b.date === date);
      bks.length ? openDayDetail(date, bks) : openAddForm(date, currentType);
    }
  }

  function toggleSelDate(iso) {
    if (selDates.includes(iso)) {
      selDates = selDates.filter(d => d !== iso);
    } else {
      selDates.push(iso);
      selDates.sort();
    }
    updateHighlights();
  }

  function updateHighlights() {
    document.querySelectorAll('[data-date]').forEach(el => {
      el.classList.toggle('sel', selDates.includes(el.dataset.date));
    });
  }

  function clearSel() {
    selDates = [];
    updateHighlights();
  }

  // ── Multi-select mode (non-consecutive tap) ───────────────────────────────────
  function enterSelMode() {
    multiSelMode = true;
    clearSel();
    document.getElementById('calSelBar').classList.add('show');
    document.getElementById('multiModeWrap').style.display = 'none';
    updateSelBar();
  }

  function exitSelMode() {
    multiSelMode = false;
    clearSel();
    document.getElementById('calSelBar').classList.remove('show');
    document.getElementById('multiModeWrap').style.display = '';
  }

  function updateSelBar() {
    const n   = selDates.length;
    const lbl = document.getElementById('selBarLabel');
    const btn = document.getElementById('selBarBook');
    lbl.textContent = n === 0 ? 'Tap dates to select' : `${n} date${n !== 1 ? 's' : ''} selected`;
    btn.disabled    = n === 0;
    btn.textContent = n > 0 ? `Book ${n}` : 'Book';
  }

  function bookSelected() {
    if (!selDates.length) return;
    const dates = [...selDates];
    exitSelMode();
    if (dates.length === 1) {
      const bks = cache.filter(b => b.date === dates[0]);
      bks.length ? openDayDetail(dates[0], bks) : openAddForm(dates[0], currentType);
    } else {
      openMultiForm(dates);
    }
  }

  function openDayDetail(iso, bks) {
    const d = new Date(iso+'T00:00:00');
    document.getElementById('sheetTitle').textContent =
      d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long'});

    const hasStd = bks.some(b => b.boxType === 'standard');
    const hasRei = bks.some(b => b.boxType === 'reinforced');

    let html = '<div class="day-detail">';
    bks.forEach(b => {
      const color     = TYPE_COLOR[b.boxType];
      const typeLabel = b.boxType === 'standard' ? 'Standard' : 'Reinforced';
      const isInv     = b.invoiced === true || String(b.invoiced).toLowerCase() === 'true';
      const invTag    = isInv ? ' · <span style="color:#16a34a;font-weight:700">Invoiced</span>' : '';
      html += `
        <div class="detail-booking" onclick="openEditForm('${b.id}')">
          <div class="detail-dot" style="background:${color}"></div>
          <div class="detail-info">
            <div class="detail-batch">${b.batch||'—'}</div>
            <div class="detail-meta">${typeLabel} · ${displayTime(b.time)} · ${STATUS_LABEL[b.status]}${invTag}</div>
          </div>
          <span class="edit-hint">Edit</span>
        </div>`;
    });

    html += '<div class="add-for">';
    if (!hasStd) html += `<button class="add-for-btn std-add" onclick="openAddForm('${iso}','standard')">+ Standard</button>`;
    if (!hasRei) html += `<button class="add-for-btn rei-add" onclick="openAddForm('${iso}','reinforced')">+ Reinforced</button>`;
    html += '</div></div>';

    document.getElementById('sheetContent').innerHTML = html;
    document.getElementById('sheetOverlay').classList.add('open');
  }

  // ── Multi-date form ───────────────────────────────────────────────────────────
  function openMultiForm(dates) {
    const type   = currentType;
    const color  = type === 'standard' ? 'std' : 'rei';
    const prefix = type === 'standard' ? 'Batch ' : 'Batch A';

    const dateLabels = dates.map(iso =>
      new Date(iso+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'})
    ).join('  ·  ');

    document.getElementById('sheetTitle').textContent = `${dates.length} dates`;
    document.getElementById('sheetContent').innerHTML = `
      <div class="sheet-body">
        <input type="hidden" id="f-dates"  value="${dates.join(',')}" />
        <input type="hidden" id="f-type"   value="${type}" />
        <input type="hidden" id="f-status" value="confirmed" />
        <input type="hidden" id="f-time"   value="14:00" />
        <div class="multi-dates">${dateLabels}</div>
        <div class="field" style="margin-top:16px">
          <div class="field-label">Time Slot</div>
          <div class="status-row">
            <div class="t-chip" onclick="selTime(event,'09:00')">9am</div>
            <div class="t-chip sel" onclick="selTime(event,'14:00')">2pm</div>
          </div>
        </div>
        <div class="field">
          <div class="field-label">Starting Batch Number</div>
          <div class="batch-field">
            <span class="batch-prefix">${prefix}</span>
            <input type="number" inputmode="numeric" id="f-start-num"
                   min="1" max="99999"
                   value="${nextBatchNum(type)}"
                   oninput="updatePreview()" />
          </div>
          <div class="batch-preview" id="batchPreview"></div>
        </div>
        <div class="field">
          <div class="field-label">Status</div>
          <div class="status-row">
            <div class="s-chip sel-confirmed" onclick="selStatus(event,'confirmed')">Confirmed</div>
            <div class="s-chip"              onclick="selStatus(event,'pending')">Pending</div>
          </div>
        </div>
        <button class="save-btn ${color}" id="saveBtn" onclick="saveMulti()">
          Save ${dates.length} Bookings
        </button>
      </div>`;

    document.getElementById('sheetOverlay').classList.add('open');
    setTimeout(() => { updatePreview(); document.getElementById('f-start-num').focus(); }, 300);
  }

  function updatePreview() {
    const num  = parseInt(document.getElementById('f-start-num').value);
    const type = document.getElementById('f-type').value;
    const dates = document.getElementById('f-dates').value.split(',');
    const el   = document.getElementById('batchPreview');
    if (!num || isNaN(num)) { el.textContent = ''; return; }
    el.textContent = dates.map((_, i) => buildBatch(num + i, type)).join(' → ');
  }

  function saveMulti() {
    const startN  = parseInt(document.getElementById('f-start-num').value);
    const type    = document.getElementById('f-type').value;
    const status  = document.getElementById('f-status').value;
    const time    = document.getElementById('f-time').value || '14:00';
    const dates   = document.getElementById('f-dates').value.split(',');

    if (!startN || isNaN(startN)) {
      document.getElementById('f-start-num').focus();
      return;
    }

    const bookings = dates.map((date, i) => ({
      id:       uid(),
      date,
      batch:    buildBatch(startN + i, type),
      time,
      boxType:  type,
      status,
      invoiced: false,
    }));

    // Update cache instantly
    cache.push(...bookings);
    saveLocal(cache);

    closeSheet();
    renderCal();
    renderList();
    showToast(`${dates.length} bookings saved`);

    // Single batch API call in background
    bgSync(`action=addMany&data=${encodeURIComponent(JSON.stringify(bookings))}`);
  }

  // ── Forms ─────────────────────────────────────────────────────────────────────
  function openAddForm(iso, type) {
    editingId = null;
    const d = new Date(iso+'T00:00:00');
    document.getElementById('sheetTitle').textContent =
      d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long'});
    document.getElementById('sheetContent').innerHTML = bookingForm(iso, type, null);
    document.getElementById('sheetOverlay').classList.add('open');
  }

  function openEditForm(id) {
    const b = cache.find(x => x.id === id);
    if (!b) return;
    editingId = id;
    const d = new Date(b.date+'T00:00:00');
    document.getElementById('sheetTitle').textContent =
      d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long'});
    document.getElementById('sheetContent').innerHTML = bookingForm(b.date, b.boxType, b);
    document.getElementById('sheetOverlay').classList.add('open');
  }

  function parseBatchNum(batch, type) {
    if (!batch) return '';
    if (type === 'standard') {
      const m = String(batch).match(/(\d+)/);
      return m ? m[1] : '';
    } else {
      const m = String(batch).match(/A(\d+)/i);
      return m ? m[1] : String(batch).replace(/[^0-9]/g, '');
    }
  }

  function buildBatch(num, type) {
    if (!num) return '';
    return type === 'standard' ? `Batch ${num}` : `Batch A${num}`;
  }

  function displayTime(t) {
    if (t === '09:00') return '9am';
    return '2pm'; // default / '14:00'
  }

  function nextBatchNum(type) {
    const nums = cache
      .filter(b => b.boxType === type && b.batch)
      .map(b => parseInt(parseBatchNum(String(b.batch), type)) || 0);
    return nums.length ? Math.max(...nums) + 1 : 1;
  }

  function bookingForm(iso, type, prefill) {
    const color  = type === 'standard' ? 'std' : 'rei';
    const s      = (prefill && prefill.status) ? prefill.status : 'confirmed';
    const tVal   = (prefill && prefill.time)   ? prefill.time   : '14:00';
    const prefix = type === 'standard' ? 'Batch ' : 'Batch A';
    const numVal = prefill ? parseBatchNum(prefill.batch, type) : nextBatchNum(type);
    const inv    = prefill && (prefill.invoiced === true || String(prefill.invoiced).toLowerCase() === 'true');
    return `
    <div class="sheet-body">
      <input type="hidden" id="f-date"     value="${iso}" />
      <input type="hidden" id="f-type"     value="${type}" />
      <input type="hidden" id="f-status"   value="${s}" />
      <input type="hidden" id="f-time"     value="${tVal}" />
      <input type="hidden" id="f-invoiced" value="${inv}" />
      <div class="field">
        <div class="field-label">Batch Number</div>
        <div class="batch-field">
          <span class="batch-prefix">${prefix}</span>
          <input type="number" inputmode="numeric" id="f-batch-num"
                 min="1" max="99999" placeholder="${type==='standard'?'24':'3'}"
                 value="${numVal}" />
        </div>
      </div>
      <div class="field">
        <div class="field-label">Time Slot</div>
        <div class="status-row">
          <div class="t-chip${tVal==='09:00'?' sel':''}" onclick="selTime(event,'09:00')">9am</div>
          <div class="t-chip${tVal!=='09:00'?' sel':''}" onclick="selTime(event,'14:00')">2pm</div>
        </div>
      </div>
      <div class="field">
        <div class="field-label">Status</div>
        <div class="status-row">
          <div class="s-chip${s==='confirmed'?' sel-confirmed':''}" onclick="selStatus(event,'confirmed')">Confirmed</div>
          <div class="s-chip${s==='pending'?' sel-pending':''}"   onclick="selStatus(event,'pending')">Pending</div>
        </div>
      </div>
      ${prefill ? `
      <div class="field">
        <div class="field-label">Invoice</div>
        <div class="status-row">
          <div class="i-chip${inv?' sel-inv':''}" onclick="toggleInvoiced(event)">${inv ? '✓ Invoiced' : 'Not invoiced'}</div>
        </div>
      </div>` : ''}
      <button class="save-btn ${color}" id="saveBtn" onclick="saveBooking()">Save</button>
      ${prefill ? `<button class="delete-btn" onclick="deleteBooking('${prefill.id}')">Delete</button>` : ''}
    </div>`;
  }

  function selStatus(e, s) {
    document.getElementById('f-status').value = s;
    document.querySelectorAll('.s-chip').forEach(c => c.className = 's-chip');
    e.currentTarget.className = `s-chip sel-${s}`;
  }

  function toggleInvoiced(e) {
    const inp    = document.getElementById('f-invoiced');
    const newVal = inp.value !== 'true';
    inp.value = newVal;
    e.currentTarget.className   = 'i-chip' + (newVal ? ' sel-inv' : '');
    e.currentTarget.textContent = newVal ? '✓ Invoiced' : 'Not invoiced';
  }

  function selTime(e, t) {
    document.getElementById('f-time').value = t;
    document.querySelectorAll('.t-chip').forEach(c => c.className = 't-chip');
    e.currentTarget.className = 't-chip sel';
  }

  // ── Save / Delete (optimistic — instant UI, background sync) ─────────────────
  function saveBooking() {
    const type    = document.getElementById('f-type').value;
    const num     = document.getElementById('f-batch-num').value.trim();
    const invEl   = document.getElementById('f-invoiced');
    const booking = {
      id:       editingId || uid(),
      date:     document.getElementById('f-date').value,
      batch:    buildBatch(num, type),
      time:     document.getElementById('f-time').value || '14:00',
      boxType:  type,
      status:   document.getElementById('f-status').value,
      invoiced: invEl ? invEl.value === 'true' : false,
    };

    // Update cache instantly
    if (editingId) {
      const idx = cache.findIndex(b => b.id === editingId);
      if (idx !== -1) cache[idx] = booking;
    } else {
      cache.push(booking);
    }
    saveLocal(cache);

    closeSheet();
    renderCal();
    renderList();
    showToast(editingId ? 'Updated' : 'Saved');

    // Sync to Google Sheets in background
    const action = editingId ? 'update' : 'add';
    bgSync(`action=${action}&data=${encodeURIComponent(JSON.stringify(booking))}`);
  }

  function deleteBooking(id) {
    if (!confirm('Delete this booking?')) return;

    cache = cache.filter(b => b.id !== id);
    saveLocal(cache);

    closeSheet();
    renderCal();
    renderList();
    showToast('Deleted');

    bgSync(`action=delete&id=${encodeURIComponent(id)}`);
  }

  // ── Sheet ─────────────────────────────────────────────────────────────────────
  function closeSheet() {
    document.getElementById('sheetOverlay').classList.remove('open');
    clearSel();
  }

  function handleOverlay(e) {
    if (e.target === document.getElementById('sheetOverlay')) closeSheet();
  }

  // ── Lists ─────────────────────────────────────────────────────────────────────
  function renderRow(b) {
    return `
      <div class="up-row">
        <div class="up-dot" style="background:${TYPE_COLOR[b.boxType]}"></div>
        <div class="up-date">${fmtShort(b.date)}</div>
        <div class="up-batch">${b.batch||'—'} · ${displayTime(b.time)}</div>
        <span class="up-badge badge-${b.status}">${STATUS_LABEL[b.status]}</span>
      </div>`;
  }

  function renderList() {
    const todayI = todayISO();

    const upcoming = cache
      .filter(b => b.date >= todayI)
      .sort((a,b) => a.date.localeCompare(b.date) || a.boxType.localeCompare(b.boxType));

    const upEl = document.getElementById('upList');
    upEl.innerHTML = upcoming.length
      ? upcoming.map(renderRow).join('')
      : '<div class="up-empty">No upcoming bookings</div>';

    const past = cache
      .filter(b => b.date < todayI)
      .sort((a,b) => b.date.localeCompare(a.date) || a.boxType.localeCompare(b.boxType)); // newest first

    const pastEl = document.getElementById('pastList');
    pastEl.innerHTML = past.length
      ? past.map(renderRow).join('')
      : '<div class="up-empty">No past bookings</div>';
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  async function manualRefresh() {
    await fetchAll();
    renderCal();
    renderList();
    showToast('Refreshed');
  }

  async function init() {
    // Show local cache immediately (instant)
    cache = loadLocal();
    initCal();
    attachCalEvents();
    renderCal();
    renderList();
    // Then sync fresh data from Google Sheets in background
    await fetchAll();
    renderCal();
    renderList();
  }

  init();
</script>
</body>
</html>
